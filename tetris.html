<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris – Game Hub</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Blockrain CSS for Tetris -->
  <link href="https://cdn.jsdelivr.net/npm/blockrain@0.2.0/dist/blockrain.min.css" rel="stylesheet">
  <!-- jQuery is required for Blockrain -->
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/blockrain@0.2.0/dist/blockrain.jquery.min.js"></script>
</head>
<body class="game-page">
  <a class="back-link" href="index.html">&larr; Back to Home</a>
  <h1>Tetris</h1>
  <div class="game-container">
    <!-- Tetris game container; width/height chosen for comfortable play -->
    <div id="tetris" class="tetris-game" style="width: 320px; height: 520px;"></div>
  </div>
  <script>
    // Initialize the Tetris game when the page loads
    $(function() {
      $('#tetris').blockrain({
        autoplay: false,
        autoplayRestart: false,
        showFieldOnStart: false,
        theme: 'modern',
        speed: 500
      });
    });
  </script>
</body>
</html>
